name: Release

# Publish to npm with provenance when a v* tag is pushed.
# One-time setup: add an `NPM_TOKEN` repo secret (npm Automation token).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only publish from a v* tag — even via manual workflow_dispatch (which must
    # then be dispatched against a tag ref). Prevents publishing arbitrary refs.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

      # Publishes sdk -> cli -> kit (topological order) with provenance.
      - run: pnpm -r --filter "./packages/*" publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
