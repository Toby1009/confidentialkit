name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — it is read from the `packageManager` field in
      # package.json (pnpm@10.x), avoiding a "multiple versions" mismatch.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      # Build before typecheck: the CLI/inspector/example resolve
      # @confidentialkit/sdk to its built dist/*.d.ts.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
